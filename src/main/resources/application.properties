# Thymeleaf
spring.thymeleaf.cache=false

# Base de donn\u00E9es H2 fichier persistante
spring.datasource.url=jdbc:h2:file:./data/location_db
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=


spring.messages.basename=messages
spring.messages.encoding=UTF-8


# Console H2
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.defer-datasource-initialization=true
spring.jpa.open-in-view=false

# D\u00E9sactiver l'initialisation SQL (base d\u00E9j\u00E0 cr\u00E9\u00E9e)
spring.sql.init.mode=never

# Upload fichiers
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Ressources statiques
spring.web.resources.static-locations=classpath:/static/,file:src/main/resources/static/

