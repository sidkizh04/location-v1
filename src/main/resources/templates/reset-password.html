<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><title>Nouveau mot de passe</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #0d0d0d; min-height: 100vh;
            display: flex; align-items: center; justify-content: center; }
        .card { background: #1a1a1a; border-radius: 16px;
            padding: 40px; width: 100%; max-width: 420px; border: none; }
        .brand { color: #e63946; font-weight: 900; font-size: 1.5rem;
            text-align: center; margin-bottom: 20px; }
        .brand span { color: #fff; }
        .form-control { background: #2a2a2a; border: 1px solid #444;
            color: #fff; padding: 12px; }
        .form-control:focus { background: #2a2a2a; color: #fff;
            border-color: #e63946; box-shadow: none; }
        .form-label { color: #aaa; }
        .btn-red { background: #e63946; color: #fff; border: none;
            width: 100%; padding: 12px; border-radius: 8px; font-weight: 700; }
        .btn-red:hover { background: #c1121f; color: #fff; }
        .link-red { color: #e63946; text-decoration: none; }
    </style>
</head>
<body>
<div class="card">
    <div class="brand"><span>RIDE WITH </span>LAAMARI</div>
    <h5 class="text-white text-center mb-4">Nouveau mot de passe</h5>

    <div th:if="${error}" class="alert alert-danger py-2" th:text="${error}"></div>

    <form th:if="${token != null}" th:action="@{/reset-password}" method="post">
        <input type="hidden" name="token" th:value="${token}">
        <div class="mb-3">
            <label class="form-label">Nouveau mot de passe</label>
            <input type="password" name="password" class="form-control"
                   placeholder="Minimum 6 caractères" minlength="6" required>
        </div>
        <button type="submit" class="btn btn-red">Changer le mot de passe</button>
    </form>
    <div class="text-center mt-3">
        <a th:href="@{/login}" class="link-red" style="font-size:.9rem">
            Retour à la connexion
        </a>
    </div>
</div>
</body>
</html>
