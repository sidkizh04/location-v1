<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:dir="${#locale.language == 'ar'} ? 'rtl' : 'ltr'"
      th:lang="${#locale.language}">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: #0d0d0d; color: #fff; font-family: 'Segoe UI', sans-serif; }
        .sidebar { background: #111; min-height: 100vh; padding: 20px;
            width: 240px; position: fixed; }
        .sidebar .brand { color: #e63946; font-weight: 900; font-size: 1.2rem;
            margin-bottom: 30px; }
        .sidebar a { color: #aaa; text-decoration: none; display: block;
            padding: 10px 15px; border-radius: 8px; margin-bottom: 5px;
            transition: all .2s; }
        .sidebar a:hover, .sidebar a.active { background: #e63946; color: #fff; }
        .sidebar .logout-btn { color: #aaa; background: none; border: none;
            width: 100%; text-align: left; padding: 10px 15px;
            border-radius: 8px; cursor: pointer; font-size: 1rem; }
        .sidebar .logout-btn:hover { background: #e63946; color: #fff; }
        .main-content { margin-left: 240px; padding: 30px; }
        .stat-card { background: #1a1a1a; border-radius: 12px; padding: 25px;
            border-left: 4px solid #e63946; }
        .stat-card .number { font-size: 2.5rem; font-weight: 900; color: #e63946; }
        .stat-card-warning { border-left-color: #ffc107 !important; }
        .stat-card-warning .number { color: #ffc107 !important; }
        .badge-attente  { background: #ffc107; color: #000; }
        .badge-confirmee { background: #28a745; }
        .badge-annulee  { background: #dc3545; }

        /* Badge notification sidebar */
        .notif-badge {
            background: #e63946;
            color: #fff;
            border-radius: 50%;
            padding: 1px 6px;
            font-size: 0.7rem;
            margin-left: 6px;
            font-weight: 700;
        }
    </style>
</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <div class="brand"><i class="fas fa-car me-2"></i>LAAMARI ADMIN</div>

    <div class="d-flex justify-content-center mb-4 text-secondary" style="font-size: 0.9rem;">
        <a href="?lang=fr" class="text-secondary text-decoration-none mx-1">FR</a> |
        <a href="?lang=en" class="text-secondary text-decoration-none mx-1">EN</a> |
        <a href="?lang=ar" class="text-secondary text-decoration-none mx-1">AR</a>
    </div>

    <a th:href="@{/admin/dashboard}" class="active">
        <i class="fas fa-tachometer-alt me-2"></i>Dashboard
    </a>
    <a th:href="@{/admin/voitures}">
        <i class="fas fa-car me-2"></i>Voitures
    </a>
    <a th:href="@{/admin/reservations}">
        <i class="fas fa-calendar me-2"></i>Réservations
    </a>
    <a th:href="@{/admin/messages}">
        <i class="fas fa-envelope me-2"></i>Messages
        <span th:if="${messagesNonLus > 0}"
              class="notif-badge" th:text="${messagesNonLus}"></span>
    </a>
    <!-- ← NOUVEAU LIEN AVIS -->
    <a th:href="@{/admin/avis}">
        <i class="fas fa-star me-2"></i>Avis
        <span th:if="${avisEnAttente > 0}"
              class="notif-badge" th:text="${avisEnAttente}"></span>
    </a>

    <form th:action="@{/logout}" method="post" class="mt-3">
        <button type="submit" class="logout-btn">
            <i class="fas fa-sign-out-alt me-2"></i>Déconnexion
        </button>
    </form>
</div>

<!-- CONTENU PRINCIPAL -->
<div class="main-content">
    <h2 class="mb-4">Tableau de bord</h2>

    <!-- Stats principales -->
    <div class="row g-4 mb-4">
        <div class="col-md-3">
            <div class="stat-card">
                <div class="number" th:text="${totalVoitures}">0</div>
                <div class="text-muted">Voitures</div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="stat-card">
                <div class="number" th:text="${totalReservations}">0</div>
                <div class="text-muted">Réservations</div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="stat-card">
                <div class="number" th:text="${messagesNonLus}">0</div>
                <div class="text-muted">Messages non lus</div>
            </div>
        </div>
        <!-- ← NOUVELLE STAT AVIS EN ATTENTE -->
        <div class="col-md-3">
            <div class="stat-card stat-card-warning">
                <div class="number" th:text="${avisEnAttente}">0</div>
                <div class="text-muted">Avis en attente</div>
            </div>
        </div>
    </div>

    <!-- Stats avis détaillées -->
    <div class="row g-3 mb-5" th:if="${statsAvis != null}">
        <div class="col-12">
            <div class="d-flex align-items-center justify-content-between mb-2">
                <h6 class="text-muted mb-0">
                    <i class="fas fa-star me-1 text-warning"></i>
                    Statistiques des avis
                </h6>
                <a th:href="@{/admin/avis}"
                   class="btn btn-sm btn-outline-danger">
                    Gérer les avis →
                </a>
            </div>
        </div>
        <div class="col-md-4">
            <div class="bg-dark rounded-3 p-3 text-center border border-secondary">
                <div class="fs-4 fw-bold text-success"
                     th:text="${statsAvis.approuves}">0</div>
                <div class="text-muted small">Approuvés</div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="bg-dark rounded-3 p-3 text-center border border-secondary">
                <div class="fs-4 fw-bold text-warning"
                     th:text="${statsAvis.enAttente}">0</div>
                <div class="text-muted small">En attente</div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="bg-dark rounded-3 p-3 text-center border border-secondary">
                <div class="fs-4 fw-bold text-danger"
                     th:text="${statsAvis.rejetes}">0</div>
                <div class="text-muted small">Rejetés</div>
            </div>
        </div>
    </div>

    <!-- Dernières réservations -->
    <h4 class="mb-3">Dernières réservations</h4>
    <div class="table-responsive">
        <table class="table table-dark table-hover rounded">
            <thead>
            <tr>
                <th>Client</th>
                <th>Voiture</th>
                <th>Dates</th>
                <th>Prix</th>
                <th>Statut</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="r : ${reservationsRecentes}">
                <td th:text="${r.utilisateur.username}"></td>
                <td th:text="${r.voiture.marque + ' ' + r.voiture.modele}"></td>
                <td th:text="${r.dateDebut + ' - ' + r.dateFin}"></td>
                <td th:text="${r.prixTotal + ' MAD'}"></td>
                <td>
                        <span class="badge"
                              th:classappend="${r.statut == 'EN_ATTENTE'} ? 'badge-attente' :
                                             (${r.statut == 'CONFIRMEE'} ? 'badge-confirmee' :
                                             'badge-annulee')"
                              th:text="${r.statut}"></span>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
