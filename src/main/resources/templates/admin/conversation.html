<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><title>Conversation</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: #0d0d0d; color: #fff; }
        .sidebar { background: #111; min-height: 100vh; padding: 20px; width: 240px; position: fixed; }
        .sidebar .brand { color: #e63946; font-weight: 900; font-size: 1.2rem; margin-bottom: 30px; }
        .sidebar a { color: #aaa; text-decoration: none; display: block; padding: 10px 15px;
            border-radius: 8px; margin-bottom: 5px; }
        .sidebar a:hover, .sidebar a.active { background: #e63946; color: #fff; }
        .sidebar .logout-btn { color: #aaa; background: none; border: none; width: 100%;
            text-align: left; padding: 10px 15px; border-radius: 8px; cursor: pointer; }
        .sidebar .logout-btn:hover { background: #e63946; color: #fff; }
        .main-content { margin-left: 240px; padding: 30px; }
        .chat-box { background: #1a1a1a; border-radius: 12px; height: 500px;
            overflow-y: auto; padding: 20px; }
        .msg { max-width: 70%; margin-bottom: 15px; }
        .msg.sent { margin-left: auto; }
        .msg.received { margin-right: auto; }
        .bubble { padding: 12px 16px; border-radius: 18px; font-size: .95rem; }
        .msg.sent .bubble { background: #e63946; color: #fff; border-bottom-right-radius: 4px; }
        .msg.received .bubble { background: #2a2a2a; color: #fff; border-bottom-left-radius: 4px; }
        .msg-time { font-size: .75rem; color: #888; margin-top: 4px; }
        .msg.sent .msg-time { text-align: right; }
        .input-area { background: #1a1a1a; border-radius: 12px; padding: 15px;
            display: flex; gap: 10px; margin-top: 15px; }
        .input-area input { flex: 1; background: #2a2a2a; border: none; color: #fff;
            border-radius: 25px; padding: 12px 20px; outline: none; }
        .btn-send { background: #e63946; border: none; color: #fff;
            border-radius: 50%; width: 48px; height: 48px; }
    </style>
</head>
<body>
<div class="sidebar">
    <div class="brand"><i class="fas fa-car"></i> LAAMARI ADMIN</div>
    <a th:href="@{/admin/dashboard}"><i class="fas fa-tachometer-alt me-2"></i>Dashboard</a>
    <a th:href="@{/admin/voitures}"><i class="fas fa-car me-2"></i>Voitures</a>
    <a th:href="@{/admin/reservations}"><i class="fas fa-calendar me-2"></i>Réservations</a>
    <a th:href="@{/admin/messages}" class="active"><i class="fas fa-envelope me-2"></i>Messages</a>
    <form th:action="@{/logout}" method="post">
        <button type="submit" class="logout-btn">
            <i class="fas fa-sign-out-alt me-2"></i>Déconnexion
        </button>
    </form>
</div>

<div class="main-content">
    <div class="d-flex align-items-center gap-3 mb-4">
        <a th:href="@{/admin/messages}" class="btn btn-outline-light btn-sm">
            <i class="fas fa-arrow-left"></i>
        </a>
        <h4 class="mb-0">Conversation avec
            <span class="text-danger" th:text="${client.username}"></span>
        </h4>
    </div>

    <div class="chat-box" id="chatBox">
        <div th:if="${#lists.isEmpty(messages)}" class="text-center text-muted py-5">
            Aucun message. Démarrez la conversation !
        </div>
        <div th:each="m : ${messages}"
             th:class="'msg ' + (${m.expediteur.id == adminId} ? 'sent' : 'received')">
            <div class="bubble" th:text="${m.contenu}"></div>
            <div class="msg-time"
                 th:text="${#temporals.format(m.dateEnvoi, 'HH:mm - dd/MM/yyyy')}"></div>
        </div>
    </div>

    <form th:action="@{/admin/messages/{id}/envoyer(id=${client.id})}"
          method="post" class="input-area">
        <input type="text" name="contenu" placeholder="Ecrire un message..." required autofocus>
        <button type="submit" class="btn-send">
            <i class="fas fa-paper-plane"></i>
        </button>
    </form>
</div>
<script>
    const box = document.getElementById('chatBox');
    box.scrollTop = box.scrollHeight;
</script>
</body>
</html>
