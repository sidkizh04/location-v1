<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><title th:text="#{admin.nav.messages}">Messages</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: #0d0d0d; color: #fff; }
        .sidebar { background: #111; min-height: 100vh; padding: 20px;
            width: 240px; position: fixed; top: 0; left: 0; }
        .sidebar .brand { color: #e63946; font-weight: 900; font-size: 1.2rem; margin-bottom: 30px; }
        .sidebar a { color: #aaa; text-decoration: none; display: block;
            padding: 10px 15px; border-radius: 8px; margin-bottom: 5px; }
        .sidebar a:hover, .sidebar a.active { background: #e63946; color: #fff; }
        .sidebar .logout-btn { color: #aaa; background: none; border: none; width: 100%;
            text-align: left; padding: 10px 15px; border-radius: 8px; cursor: pointer; }
        .sidebar .logout-btn:hover { background: #e63946; color: #fff; }
        .main-content { margin-left: 240px; padding: 30px; }
        .client-card { background: #1a1a1a; border-radius: 12px; padding: 20px;
            text-decoration: none; color: #fff; display: block;
            transition: all .2s; border: 1px solid #333; margin-bottom: 15px; }
        .client-card:hover { border-color: #e63946; color: #fff; }
        .avatar { width: 50px; height: 50px; background: #e63946; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: 900; font-size: 1.2rem; }
    </style>
</head>
<body>
<div class="sidebar">
    <div class="brand"><i class="fas fa-car"></i> LAAMARI <span th:text="#{nav.admin}">ADMIN</span></div>
    <div class="d-flex justify-content-center mb-4 text-secondary" style="font-size: 0.9rem;">
        <a href="?lang=fr" class="text-secondary text-decoration-none mx-1">FR</a> |
        <a href="?lang=en" class="text-secondary text-decoration-none mx-1">EN</a> |
        <a href="?lang=ar" class="text-secondary text-decoration-none mx-1">AR</a>
    </div>
    <a th:href="@{/admin/dashboard}"><i class="fas fa-tachometer-alt me-2"></i><span th:text="#{admin.nav.dashboard}">Dashboard</span></a>
    <a th:href="@{/admin/voitures}"><i class="fas fa-car me-2"></i><span th:text="#{admin.nav.cars}">Voitures</span></a>
    <a th:href="@{/admin/reservations}"><i class="fas fa-calendar me-2"></i><span th:text="#{admin.nav.reservations}">Réservations</span></a>
    <a th:href="@{/admin/messages}" class="active"><i class="fas fa-envelope me-2"></i><span th:text="#{admin.nav.messages}">Messages</span></a>
    <a th:href="@{/admin/avis}"><i class="fas fa-star me-2"></i><span th:text="#{admin.nav.reviews}">Avis</span></a>
    <form th:action="@{/logout}" method="post">
        <button type="submit" class="logout-btn">
            <i class="fas fa-sign-out-alt me-2"></i><span th:text="#{nav.logout}">Déconnexion</span>
        </button>
    </form>
</div>

<div class="main-content">
    <h2 class="mb-4" th:text="#{admin.msg.header}">Messagerie — Clients</h2>
    <div th:if="${clients == null or #lists.isEmpty(clients)}"
         class="text-center text-muted py-5">
        <i class="fas fa-users fa-3x mb-3 d-block"></i>
        <p th:text="#{admin.msg.empty}">Aucun client inscrit pour le moment.</p>
    </div>
    <div th:unless="${clients == null or #lists.isEmpty(clients)}">
        <div th:each="c : ${clients}">
            <a th:href="@{/admin/messages/{id}(id=${c.id})}" class="client-card">
                <div class="d-flex align-items-center gap-3">
                    <div class="avatar">
                        <span th:text="${#strings.toUpperCase(#strings.substring(c.username, 0, 1))}"></span>
                    </div>
                    <div>
                        <div class="fw-bold" th:text="${c.username}"></div>
                        <small class="text-muted"
                               th:text="${c.email != null ? c.email : #{admin.msg.no_email}}"></small>
                    </div>
                    <i class="fas fa-chevron-right ms-auto text-muted"></i>
                </div>
            </a>
        </div>
    </div>
</div>
</body>
</html>
