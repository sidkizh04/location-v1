<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><title th:text="#{admin.cars.title}">Gestion Voitures</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: #0d0d0d; color: #fff; }
        .sidebar { background: #111; min-height: 100vh; padding: 20px;
            width: 240px; position: fixed; }
        .sidebar .brand { color: #e63946; font-weight: 900;
            font-size: 1.2rem; margin-bottom: 30px; }
        .sidebar a { color: #aaa; text-decoration: none; display: block;
            padding: 10px 15px; border-radius: 8px; margin-bottom: 5px;
            transition: all .2s; }
        .sidebar a:hover, .sidebar a.active { background: #e63946; color: #fff; }
        .sidebar .logout-btn { color: #aaa; background: none; border: none;
            width: 100%; text-align: left; padding: 10px 15px;
            border-radius: 8px; cursor: pointer; }
        .sidebar .logout-btn:hover { background: #e63946; color: #fff; }
        .main-content { margin-left: 240px; padding: 30px; }
        .car-card { background: #1a1a1a; border-radius: 12px; overflow: hidden;
            transition: transform .2s; }
        .car-card:hover { transform: translateY(-5px); }
        .car-card img { width: 100%; height: 200px; object-fit: cover; }
        .car-card .no-img { width: 100%; height: 200px; background: #333;
            display: flex; align-items: center; justify-content: center;
            color: #666; font-size: 3rem; }
        .btn-red { background: #e63946; color: #fff; border: none; }
        .btn-red:hover { background: #c1121f; color: #fff; }
        .badge-dispo { background: #28a745; }
        .badge-indispo { background: #dc3545; }
        .spec-badge { background: #2a2a2a; color: #aaa; font-size: .75rem;
            padding: 3px 8px; border-radius: 20px; }
    </style>
</head>
<body>
<div class="sidebar">
    <div class="brand"><i class="fas fa-car"></i> LAAMARI <span th:text="#{nav.admin}">ADMIN</span></div>
    <div class="d-flex justify-content-center mb-4 text-secondary" style="font-size: 0.9rem;">
        <a href="?lang=fr" class="text-secondary text-decoration-none mx-1">FR</a> |
        <a href="?lang=en" class="text-secondary text-decoration-none mx-1">EN</a> |
        <a href="?lang=ar" class="text-secondary text-decoration-none mx-1">AR</a>
    </div>
    <a th:href="@{/admin/dashboard}">
        <i class="fas fa-tachometer-alt me-2"></i><span th:text="#{admin.nav.dashboard}">Dashboard</span>
    </a>
    <a th:href="@{/admin/voitures}" class="active">
        <i class="fas fa-car me-2"></i><span th:text="#{admin.nav.cars}">Voitures</span>
    </a>
    <a th:href="@{/admin/reservations}">
        <i class="fas fa-calendar me-2"></i><span th:text="#{admin.nav.reservations}">Reservations</span>
    </a>
    <a th:href="@{/admin/messages}">
        <i class="fas fa-envelope me-2"></i><span th:text="#{admin.nav.messages}">Messages</span>
    </a>
    <a th:href="@{/admin/avis}">
        <i class="fas fa-star me-2"></i><span th:text="#{admin.nav.reviews}">Avis</span>
    </a>
    <form th:action="@{/logout}" method="post">
        <button type="submit" class="logout-btn">
            <i class="fas fa-sign-out-alt me-2"></i><span th:text="#{nav.logout}">Deconnexion</span>
        </button>
    </form>
</div>

<div class="main-content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 th:text="#{admin.cars.header}">Gestion des Voitures</h2>
        <a th:href="@{/admin/voitures/nouveau}" class="btn btn-red">
            <i class="fas fa-plus me-2"></i><span th:text="#{admin.cars.add}">Ajouter une voiture</span>
        </a>
    </div>

    <div class="row g-4">
        <div class="col-md-4" th:each="v : ${voitures}">
            <div class="car-card">

                <!-- Image -->
                <img th:if="${v.imageUrL != null}"
                     th:src="${v.imageUrL}" th:alt="${v.marque}">
                <div class="no-img" th:unless="${v.imageUrL != null}">
                    <i class="fas fa-car"></i>
                </div>

                <div class="p-3">
                    <!-- Titre + Prix -->
                    <div class="d-flex justify-content-between align-items-start mb-2">
                        <div>
                            <h5 class="mb-0"
                                th:text="${v.marque + ' ' + v.modele}"></h5>
                            <div class="mt-1">
                                <span th:if="${v.annee != null}"
                                      class="text-muted small"
                                      th:text="${v.annee}"></span>
                                <span th:if="${v.couleur != null}"
                                      class="text-muted small"
                                      th:text="${' • ' + v.couleur}"></span>
                            </div>
                        </div>
                        <span class="text-danger fw-bold"
                              th:text="${v.prixParJour + ' MAD/j'}"></span>
                    </div>

                    <!-- Badge disponibilité -->
                    <span class="badge mb-2"
                          th:classappend="${v.disponible} ? 'badge-dispo' : 'badge-indispo'"
                          th:text="${v.disponible} ? #{status.available} : #{status.rented}">
                    </span>

                    <!-- Specs -->
                    <div class="d-flex flex-wrap gap-1 mb-3">
                        <span class="spec-badge">
                            <i th:class="${v.carburant == 'Electrique'} ? 'fas fa-bolt me-1' :
                                         (${v.carburant == 'Hybride'} ? 'fas fa-leaf me-1' :
                                         'fas fa-gas-pump me-1')"></i>
                            <span th:text="${v.carburant != null ? v.carburant : 'Essence'}"></span>
                        </span>
                        <span class="spec-badge" th:if="${v.transmission != null}">
                            <i class="fas fa-cog me-1"></i>
                            <span th:text="${v.transmission}"></span>
                        </span>
                        <span class="spec-badge" th:if="${v.nombrePlaces != null}">
                            <i class="fas fa-users me-1"></i>
                            <span th:text="${v.nombrePlaces}"></span> <span th:text="#{admin.cars.places}">places</span>
                        </span>
                    </div>

                    <!-- Actions -->
                    <div class="d-flex gap-2">
                        <!-- Voir détail public -->
                        <a th:href="@{/voitures/{id}(id=${v.id})}"
                           class="btn btn-sm btn-outline-secondary"
                           th:title="#{admin.cars.btn_view}">
                            <i class="fas fa-eye"></i>
                        </a>
                        <!-- Modifier -->
                        <a th:href="@{/admin/voitures/modifier/{id}(id=${v.id})}"
                           class="btn btn-sm btn-outline-light"
                           th:title="#{admin.cars.btn_edit}">
                            <i class="fas fa-edit"></i>
                        </a>
                        <!-- Supprimer -->
                        <a th:href="@{/admin/voitures/supprimer/{id}(id=${v.id})}"
                           class="btn btn-sm btn-outline-danger"
                           th:data-confirm="#{admin.cars.confirm_delete}"
                           onclick="return confirm(this.getAttribute('data-confirm'))"
                           th:title="#{admin.cars.btn_delete}">
                            <i class="fas fa-trash"></i>
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
