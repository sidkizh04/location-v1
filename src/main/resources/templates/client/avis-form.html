<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><title th:text="#{client.dash.reviews}">Laisser un avis - LAAMARI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: #0d0d0d; color: #fff; font-family: 'Segoe UI', sans-serif; }
        .navbar-custom { background: #111; padding: 15px 40px;
            display: flex; align-items: center; justify-content: space-between; }
        .brand { color: #e63946; font-weight: 900; font-size: 1.3rem; }
        .nav-links a { color: #aaa; text-decoration: none; margin-left: 25px; }
        .nav-links a:hover { color: #e63946; }

        .main { padding: 40px; max-width: 700px; margin: 0 auto; }

        .card-avis {
            background: #1a1a1a;
            border-radius: 16px;
            padding: 35px;
            border: 1px solid #2a2a2a;
        }

        /* ── Étoiles interactives ── */
        .stars-input {
            display: flex;
            flex-direction: row-reverse;
            justify-content: center;
            gap: 8px;
            margin: 20px 0;
        }
        .stars-input input {
            display: none;
        }
        .stars-input label {
            font-size: 2.8rem;
            color: #444;
            cursor: pointer;
            transition: color 0.15s;
        }
        /* Étoile survolée + toutes celles après (row-reverse) */
        .stars-input label:hover,
        .stars-input label:hover ~ label,
        .stars-input input:checked ~ label {
            color: #ffc107;
        }

        .note-texte {
            text-align: center;
            color: #ffc107;
            font-size: 0.95rem;
            min-height: 22px;
            margin-bottom: 10px;
        }

        textarea.form-control {
            background: #111;
            border: 1px solid #333;
            color: #fff;
            border-radius: 10px;
            resize: vertical;
        }
        textarea.form-control:focus {
            background: #111;
            border-color: #e63946;
            color: #fff;
            box-shadow: 0 0 0 0.2rem rgba(230,57,70,0.25);
        }

        .voiture-info {
            background: #111;
            border-radius: 12px;
            padding: 15px 20px;
            margin-bottom: 25px;
            border-left: 4px solid #e63946;
        }

        .btn-soumettre {
            background: #e63946;
            color: #fff;
            border: none;
            padding: 12px 35px;
            border-radius: 25px;
            font-size: 1rem;
            font-weight: 600;
            transition: background 0.2s;
            width: 100%;
        }
        .btn-soumettre:hover { background: #c1121f; color: #fff; }
        .btn-soumettre:disabled { background: #555; cursor: not-allowed; }

        .btn-retour {
            color: #aaa;
            text-decoration: none;
            font-size: 0.9rem;
        }
        .btn-retour:hover { color: #fff; }
    </style>
</head>
<body>

<!-- NAVBAR -->
<div class="navbar-custom">
    <div class="brand">RIDE WITH LAAMARI</div>
    <div class="nav-links">
        <a th:href="@{/client/dashboard}">
            <i class="fas fa-arrow-left me-1"></i><span th:text="#{nav.myspace}">Mon espace</span>
        </a>
    </div>
</div>

<div class="main">

    <div class="d-flex align-items-center gap-3 mb-4">
        <a th:href="@{/client/dashboard}" class="btn-retour">
            <i class="fas fa-chevron-left me-1"></i><span th:text="#{btn.back}">Retour</span>
        </a>
        <h4 class="mb-0" th:text="#{client.dash.reviews}">Laisser un avis</h4>
    </div>

    <!-- Info voiture -->
    <div class="voiture-info">
        <div class="d-flex justify-content-between align-items-center">
            <div>
                <h5 class="mb-0"
                    th:text="${voiture.marque + ' ' + voiture.modele}"></h5>
                <small class="text-muted">
                    <span th:text="#{client.dash.res_of}">Réservation du</span>
                    <span th:text="${reservation.dateDebut}"></span>
                    <span th:text="#{client.dash.to}">au</span>
                    <span th:text="${reservation.dateFin}"></span>
                </small>
            </div>
            <span class="badge bg-success" th:text="#{status.confirmed}">CONFIRMEE</span>
        </div>
    </div>

    <!-- Formulaire -->
    <div class="card-avis">
        <h5 class="text-center mb-1" th:text="#{review.how}">Comment s'est passée votre expérience ?</h5>
        <p class="text-center text-muted small mb-4" th:text="#{review.moderation}">
            Votre avis sera visible après modération
        </p>

        <form th:action="@{/client/avis/soumettre}" method="post">
            <input type="hidden" name="reservationId"
                   th:value="${reservation.id}"/>

            <!-- Étoiles -->
            <div class="stars-input">
                <input type="radio" id="star5" name="note" value="5" required/>
                <label for="star5" title="Excellent"><i class="fas fa-star"></i></label>

                <input type="radio" id="star4" name="note" value="4"/>
                <label for="star4" title="Très bien"><i class="fas fa-star"></i></label>

                <input type="radio" id="star3" name="note" value="3"/>
                <label for="star3" title="Bien"><i class="fas fa-star"></i></label>

                <input type="radio" id="star2" name="note" value="2"/>
                <label for="star2" title="Moyen"><i class="fas fa-star"></i></label>

                <input type="radio" id="star1" name="note" value="1"/>
                <label for="star1" title="Mauvais"><i class="fas fa-star"></i></label>
            </div>

            <!-- Texte dynamique selon la note -->
            <div class="note-texte" id="noteTexte"></div>

            <!-- Commentaire -->
            <div class="mb-4">
                <label class="form-label text-muted small">
                    <span th:text="#{review.comment}">Commentaire</span> <span class="text-muted" th:text="#{review.optional}">(optionnel)</span>
                </label>
                <textarea name="commentaire"
                          class="form-control"
                          rows="4"
                          maxlength="1000"
                          th:placeholder="#{review.placeholder}"></textarea>
                <div class="text-end text-muted small mt-1">
                    <span id="charCount">0</span>/1000
                </div>
            </div>

            <!-- Bouton -->
            <button type="submit" class="btn-soumettre" id="btnSoumettre" disabled>
                <i class="fas fa-paper-plane me-2"></i><span th:text="#{review.submit}">Envoyer mon avis</span>
            </button>
        </form>
    </div>
</div>

<script>
    const labels = {
        1: '😞 Mauvais',
        2: '😐 Moyen',
        3: '🙂 Bien',
        4: '😊 Très bien',
        5: '🤩 Excellent !'
    };

    // Activer bouton + afficher texte quand note sélectionnée
    document.querySelectorAll('input[name="note"]').forEach(input => {
        input.addEventListener('change', () => {
            document.getElementById('noteTexte').textContent =
                labels[input.value];
            document.getElementById('btnSoumettre').disabled = false;
        });
    });

    // Compteur caractères
    const textarea = document.querySelector('textarea[name="commentaire"]');
    const charCount = document.getElementById('charCount');
    textarea.addEventListener('input', () => {
        charCount.textContent = textarea.value.length;
    });
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
