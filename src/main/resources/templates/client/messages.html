<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><title th:text="#{voitures.nav_messages}">Messages</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: #0d0d0d; color: #fff; font-family: 'Segoe UI', sans-serif; }
        .navbar-custom { background: #111; padding: 15px 40px;
            display: flex; align-items: center; justify-content: space-between; }
        .brand { color: #e63946; font-weight: 900; font-size: 1.3rem; }
        .nav-links a { color: #aaa; text-decoration: none; margin-left: 25px; }
        .nav-links a:hover { color: #e63946; }
        .logout-btn { color: #aaa; background: none; border: none;
            cursor: pointer; margin-left: 25px; font-size: 1rem; }
        .logout-btn:hover { color: #e63946; }
        .main { padding: 40px; max-width: 800px; margin: 0 auto; }
        .chat-box { background: #1a1a1a; border-radius: 12px; height: 500px;
            overflow-y: auto; padding: 20px; }
        .msg { max-width: 70%; margin-bottom: 15px; }
        .msg.sent { margin-left: auto; }
        .bubble { padding: 12px 16px; border-radius: 18px; }
        .msg.sent .bubble { background: #e63946; color: #fff;
            border-bottom-right-radius: 4px; }
        .msg.received .bubble { background: #2a2a2a; color: #fff;
            border-bottom-left-radius: 4px; }
        .msg-time { font-size: .75rem; color: #888; margin-top: 4px; }
        .msg.sent .msg-time { text-align: right; }
        .input-area { background: #1a1a1a; border-radius: 12px; padding: 15px;
            display: flex; gap: 10px; margin-top: 15px; }
        .input-area input { flex: 1; background: #2a2a2a; border: none; color: #fff;
            border-radius: 25px; padding: 12px 20px; outline: none; }
        .btn-send { background: #e63946; border: none; color: #fff;
            border-radius: 50%; width: 48px; height: 48px; }
    </style>
</head>
<body>
<div class="navbar-custom">
    <div class="brand">RIDE WITH LAAMARI</div>
    <div class="nav-links">
        <a th:href="@{/client/dashboard}">
            <i class="fas fa-home me-1"></i><span th:text="#{nav.myspace}">Dashboard</span>
        </a>
        <a th:href="@{/voitures}">
            <i class="fas fa-car me-1"></i><span th:text="#{nav.home}">Catalogue</span>
        </a>
        <form th:action="@{/logout}" method="post" class="d-inline">
            <button type="submit" class="logout-btn">
                <i class="fas fa-sign-out-alt me-1"></i><span th:text="#{nav.logout}">Deconnexion</span>
            </button>
        </form>
    </div>
</div>

<div class="main">
    <h3 class="mb-4">
        <i class="fas fa-headset text-danger me-2"></i><span th:text="#{client.msg.support}">Support LAAMARI</span>
    </h3>

    <div class="chat-box" id="chatBox">
        <div th:if="${#lists.isEmpty(messages)}"
             class="text-center text-muted py-5">
            <i class="fas fa-headset fa-3x mb-3 d-block"></i>
            <p th:text="#{client.msg.empty}">Comment pouvons-nous vous aider ?</p>
        </div>
        <div th:each="m : ${messages}"
             th:class="'msg ' + (${m.expediteur.id != adminId} ? 'sent' : 'received')">
            <div class="bubble" th:text="${m.contenu}"></div>
            <div class="msg-time"
                 th:text="${#temporals.format(m.dateEnvoi,'HH:mm - dd/MM/yyyy')}"></div>
        </div>
    </div>

    <form th:action="@{/client/messages/envoyer}" method="post" class="input-area">
        <input type="text" name="contenu"
               th:placeholder="#{client.msg.placeholder}" required autofocus>
        <button type="submit" class="btn-send">
            <i class="fas fa-paper-plane"></i>
        </button>
    </form>
</div>
<script>
    const box = document.getElementById('chatBox');
    box.scrollTop = box.scrollHeight;
</script>
</body>
</html>
