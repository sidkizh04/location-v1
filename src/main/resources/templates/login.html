<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:dir="${#locale.language == 'ar'} ? 'rtl' : 'ltr'"
      th:lang="${#locale.language}">
<head>
  <meta charset="UTF-8"><title th:text="#{login.title}">Connexion - LAAMARI</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <style>
    body { background: #0d0d0d; min-height: 100vh;
      display: flex; align-items: center; justify-content: center; }
    .login-card { background: #1a1a1a; border-radius: 16px;
      padding: 40px; width: 100%; max-width: 420px; }
    .brand { color: #e63946; font-weight: 900; font-size: 1.5rem;
      text-align: center; margin-bottom: 30px; }
    .brand span { color: #fff; }
    .form-control { background: #2a2a2a; border: 1px solid #444;
      color: #fff; padding: 12px; border-radius: 8px; }
    .form-control:focus { background: #2a2a2a; color: #fff;
      border-color: #e63946; box-shadow: none; }
    .form-control::placeholder { color: #555; }
    .form-label { color: #aaa; }
    .btn-red { background: #e63946; color: #fff; border: none;
      width: 100%; padding: 12px; border-radius: 8px;
      font-weight: 700; font-size: 1rem; }
    .btn-red:hover { background: #c1121f; color: #fff; }
    .link-red { color: #e63946; text-decoration: none; }
    .link-red:hover { color: #c1121f; }
    .divider { border-color: #333; margin: 20px 0; }
    .input-icon { position: relative; }
    .input-icon .fas { position: absolute; left: 14px; top: 50%;
      transform: translateY(-50%); color: #555; }
    .input-icon input { padding-left: 40px; }
  </style>
</head>
<body>
<div class="login-card">
  <div class="brand"><span th:text="#{login.brand1}">RIDE WITH </span><span th:text="#{login.brand2}">LAAMARI</span></div>
  
  <div class="d-flex justify-content-center mb-4 text-secondary" style="font-size: 0.9rem;">
      <a href="?lang=fr" class="text-secondary text-decoration-none mx-2">FR</a> |
      <a href="?lang=en" class="text-secondary text-decoration-none mx-2">EN</a> |
      <a href="?lang=ar" class="text-secondary text-decoration-none mx-2">AR</a>
  </div>

  <!-- Erreur connexion -->
  <div th:if="${error}"
       class="alert alert-danger py-2" th:text="${error}"></div>

  <!-- Message déconnexion -->
  <div th:if="${message}"
       class="alert alert-success py-2" th:text="${message}"></div>

  <!-- Email vérifié avec succès -->
  <div th:if="${param['email-verifie']}"
       class="alert alert-success py-2">
    <i class="fas fa-check-circle me-2"></i>
    <span th:text="#{msg.email_verified}">Email verifie ! Vous pouvez vous connecter.</span>
  </div>

  <!-- Reset mot de passe succès -->
  <div th:if="${param.reset}"
       class="alert alert-success py-2">
    <i class="fas fa-lock me-2"></i>
    <span th:text="#{msg.password_reset}">Mot de passe modifie avec succes !</span>
  </div>

  <form th:action="@{/login}" method="post">

    <div class="mb-3">
      <label class="form-label" th:text="#{login.email_username}">Email ou nom d'utilisateur</label>
      <div class="input-icon">
        <i class="fas fa-user"></i>
        <input type="text" name="username" class="form-control"
               th:placeholder="#{login.email_ph}"
               required autofocus>
      </div>
    </div>

    <div class="mb-2">
      <label class="form-label" th:text="#{login.password}">Mot de passe</label>
      <div class="input-icon">
        <i class="fas fa-lock"></i>
        <input type="password" name="password" class="form-control"
               th:placeholder="#{login.password_ph}" required>
      </div>
    </div>

    <div class="mb-4 text-end">
      <a th:href="@{/forgot-password}" class="link-red"
         style="font-size:.85rem" th:text="#{login.forgot}">
        Mot de passe oublie ?
      </a>
    </div>

    <button type="submit" class="btn btn-red">
      <i class="fas fa-sign-in-alt me-2"></i><span th:text="#{login.btn}">Se connecter</span>
    </button>
  </form>

  <hr class="divider">
  <p class="text-center text-muted mb-0" style="font-size:.9rem">
    <span th:text="#{login.no_account}">Pas encore de compte ?</span>
    <a th:href="@{/inscription}" class="link-red" th:text="#{login.signup}">S'inscrire</a>
  </p>
</div>
</body>
</html>
