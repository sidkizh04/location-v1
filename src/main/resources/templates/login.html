<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Connexion | RIDE WITH LAAMARI</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 flex items-center justify-center h-screen">

<div class="bg-white p-10 rounded-2xl shadow-2xl w-full max-w-md">
  <div class="text-center mb-8">
    <h2 class="text-3xl font-black italic">RIDE WITH <span class="text-red-600">LAAMARI</span></h2>
    <p class="text-gray-500 uppercase text-xs tracking-widest font-bold mt-2">Espace Privé</p>
  </div>

  <div th:if="${param.error}" class="bg-red-100 text-red-700 p-3 rounded-lg mb-4 text-sm font-bold">
    Identifiants incorrects.
  </div>

  <form th:action="@{/login}" method="post" class="space-y-6">
    <div>
      <label class="block text-sm font-bold text-gray-700 mb-2">Nom d'utilisateur</label>
      <input type="text" name="username" class="w-full border-2 border-gray-100 p-3 rounded-xl focus:border-red-600 outline-none transition" placeholder="Votre pseudo" required>
    </div>

    <div>
      <label class="block text-sm font-bold text-gray-700 mb-2">Mot de passe</label>
      <input type="password" name="password" class="w-full border-2 border-gray-100 p-3 rounded-xl focus:border-red-600 outline-none transition" placeholder="••••••••" required>
    </div>

    <button type="submit" class="w-full bg-red-600 hover:bg-red-700 text-white font-black py-4 rounded-xl shadow-lg transition duration-300 uppercase tracking-wider">
      Se Connecter
    </button>
  </form>

  <div class="mt-8 text-center">
    <a href="/" class="text-gray-400 hover:text-black text-sm transition">← Retour au site</a>
  </div>
</div>

</body>
</html>
